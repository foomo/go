# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: go

release:
  prerelease: auto

builds:
  - skip: true

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

changelog:
  use: github-native
